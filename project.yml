name: FocusMoments
options:
  bundleIdPrefix: com.focusmoments
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true

packages:
  Lottie:
    url: https://github.com/airbnb/lottie-ios
    from: "4.4.0"

targets:
  FocusMoments:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: FocusMoments
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.focusmoments.app
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        INFOPLIST_FILE: FocusMoments/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        SWIFT_VERSION: "5.9"
        DEVELOPMENT_TEAM: ""
        CODE_SIGN_STYLE: Automatic
        TARGETED_DEVICE_FAMILY: "1,2"
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: true
        ENABLE_PREVIEWS: true
    dependencies:
      - package: Lottie

schemes:
  FocusMoments:
    build:
      targets:
        FocusMoments: all
    run:
      config: Debug
    archive:
      config: Release
